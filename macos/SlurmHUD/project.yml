name: SlurmHUD
options:
  deploymentTarget:
    macOS: "14.0"
schemes:
  SlurmHUD:
    build:
      targets:
        SlurmHUD: all
        SlurmHUDWidget: all
  SlurmHUDWidget:
    build:
      targets:
        SlurmHUDWidget: all
targets:
  SlurmHUD:
    type: application
    platform: macOS
    sources:
      - Sources/SlurmHUDApp
      - path: Sources/Shared
        includes:
          - Config.swift
          - Helpers.swift
          - MockClusterData.swift
          - Models.swift
          - NotificationManager.swift
          - SSHRunner.swift
          - StatusFetcher.swift
          - WatchStore.swift
    info:
      path: Sources/SlurmHUDApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jbauer.SlurmHUD
        # Ad-hoc signing. App Groups would require a paid Apple Developer
        # Program membership ($99/yr) to register the group.* identifier
        # on developer.apple.com — without that registration the auto-
        # generated provisioning profile silently drops the entitlement.
        # Instead we share data via a sandbox temporary-exception on
        # /private/tmp/slurmhud/. See SharedContainer in Config.swift.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: Sources/SlurmHUDApp/SlurmHUD.entitlements
        DEVELOPMENT_TEAM: ""
    postBuildScripts:
      - script: |
          cp "${SRCROOT}/Sources/SlurmHUDApp/AppIcon.icns" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/AppIcon.icns"
        name: Copy App Icon
    dependencies:
      - target: SlurmHUDWidget
  SlurmHUDWidget:
    type: app-extension
    platform: macOS
    sources:
      - Sources/SlurmHUDWidget
      - path: Sources/Shared
        includes:
          - Config.swift
          - MockClusterData.swift
          - Models.swift
    info:
      path: Sources/SlurmHUDWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jbauer.SlurmHUD.SlurmHUDWidget
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: Sources/SlurmHUDWidget/SlurmHUDWidget.entitlements
        DEVELOPMENT_TEAM: ""
